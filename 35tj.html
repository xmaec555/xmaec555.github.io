<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蚂蚁啊啊盘子35M统计</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        body {
            background: #0f0f12;
            color: #eaeaea;
            padding: 20px;
            line-height: 1.6;
        }

        /* 顶部标题 */
        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .page-title {
            font-size: 26px;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(90deg, #4d9fff, #ff9c41);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* 主容器 */
        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 卡片样式 */
        .card {
            background: #1a1a20;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            border: 1px solid #2d2d35;
            transition: all 0.2s;
        }
        .card:hover {
            border-color: #3a3a45;
        }

        /* 卡片标题 */
        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2d2d35;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .title-1 { color: #4d9fff; }
        .title-2 { color: #5ccb5f; }
        .title-compare { color: #ff9c41; }

        /* 输入区域 */
        .input-group {
            margin-bottom: 16px;
        }
        .input-label {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #ccc;
        }
        textarea {
            width: 100%;
            height: 110px;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #24242d;
            color: #fff;
            font-size: 14px;
            resize: vertical;
            outline: none;
            transition: 0.2s;
        }
        textarea:focus {
            border-color: #4d9fff;
            background: #272732;
            box-shadow: 0 0 0 3px rgba(77, 159, 255, 0.1);
        }
        .input-count {
            font-size: 13px;
            color: #888;
            margin-top: 6px;
        }

        /* 按钮 */
        .btn-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }
        .btn {
            padding: 9px 16px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-clear {
            background: #d9534f;
            color: #fff;
        }
        .btn-clear:hover {
            background: #c44642;
        }
        .btn-compare-clear {
            background: #444;
            color: #fff;
        }
        .btn-compare-clear:hover {
            background: #555;
        }

        /* 结果区域 */
        .result-box {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed #2d2d35;
        }
        .result-item {
            margin-bottom: 14px;
            font-size: 14px;
        }
        .result-label {
            display: inline-block;
            width: 70px;
            color: #aaa;
        }
        .result-value {
            font-weight: 600;
        }
        .highlight { color: #ffaa00; }
        .hot { color: #ff6b6b; }
        .cold { color: #4d9fff; }

        /* 统计列表 */
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }
        .stats-item {
            padding: 6px 10px;
            background: #272732;
            border-radius: 8px;
            font-size: 13px;
            white-space: nowrap;
        }
        .stats-hot { background: #3d2626; color: #ff6b6b; }
        .stats-cold { background: #262d3d; color: #4d9fff; }

        /* 对比结果 */
        .compare-item {
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 14px;
            background: #272732;
            border-left: 4px solid #444;
        }
        .compare-l1 { border-left-color: #4d9fff; background: #262d3d; }
        .compare-l2 { border-left-color: #5ccb5f; background: #263d27; }
        .compare-l3 { border-left-color: #ff9c41; background: #3d2f26; }
        .compare-final {
            border-left-color: #ff6b6b;
            background: #3d2626;
            font-weight: 600;
            font-size: 15px;
        }

        /* 复制按钮 */
        .copy-btn {
            padding: 6px 12px;
            border-radius: 8px;
            background: #3b9453;
            color: #fff;
            border: none;
            font-size: 12px;
            cursor: pointer;
            margin-left: 10px;
        }
        .copy-btn:hover {
            background: #328047;
        }
        .copy-tip {
            font-size: 12px;
            color: #5ccb5f;
            margin-left: 8px;
        }

        /* 自动提示 */
        .auto-tip {
            font-size: 13px;
            color: #5ccb5f;
            font-weight: 600;
        }

        /* 底部 */
        .footer {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-top: 30px;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="page-header">
        <h1 class="page-title">蚂蚁啊啊盘子35M统计</h1>
    </div>

    <div class="main-container">
        <!-- 第一组 -->
        <div class="card">
            <div class="card-title title-1">
                第一组数据统计
                <span id="autoTip1" class="auto-tip"></span>
            </div>
            <div class="input-group">
                <div class="input-label">蚂蚁数据-啊啊专家</div>
                <textarea id="numInput1" placeholder="请输入数字，用空格分隔" oninput="onDataChange()"></textarea>
                <div class="input-count" id="inputInfo1">已输入：0 个数字</div>
            </div>
            <div class="btn-row">
                <button class="btn btn-clear" onclick="clearAll(1)">清空本组</button>
            </div>

            <div class="result-box">
                <div id="baseResult1"></div>
                <div id="groupResult1" style="margin-top:12px"></div>
                <div id="zodiacResult1" style="margin-top:12px"></div>
            </div>
        </div>

        <!-- 第二组 -->
        <div class="card">
            <div class="card-title title-2">
                第二组数据统计
                <span id="autoTip2" class="auto-tip"></span>
            </div>
            <div class="input-group">
                <div class="input-label">蚂蚁数据-啊啊专家</div>
                <textarea id="numInput2" placeholder="请输入数字，用空格分隔" oninput="onDataChange()"></textarea>
                <div class="input-count" id="inputInfo2">已输入：0 个数字</div>
            </div>
            <div class="btn-row">
                <button class="btn btn-clear" onclick="clearAll(2)">清空本组</button>
            </div>

            <div class="result-box">
                <div id="baseResult2"></div>
                <div id="groupResult2" style="margin-top:12px"></div>
                <div id="zodiacResult2" style="margin-top:12px"></div>
            </div>
        </div>

        <!-- 交叉对比 -->
        <div class="card">
            <div class="card-title title-compare">
                🔍 交叉对比结果
                <span id="autoCompareTip" class="auto-tip"></span>
            </div>
            <div class="btn-row">
                <button class="btn btn-compare-clear" onclick="clearCompare()">清空对比结果</button>
            </div>
            <div id="compareTip" style="margin:10px 0"></div>
            <div id="compareResult"></div>
        </div>
    </div>

    <div class="footer">
        © 2026 蚂蚁数据啊啊团队 - 版权所有<br>
        全自动统计 | 实时对比
    </div>

<script>
// 全局配置
const zodiacList = ['马','蛇','龙','兔','虎','牛','鼠','猪','狗','鸡','猴','羊'];
const countData = { 1: {}, 2: {} };
const minMax = { 1: { min:0, max:0 }, 2: { min:0, max:0 } };
let timer = null;

// 工具函数
const padZero = num => num.toString().padStart(2, '0');
const getZodiac = num => zodiacList[(num - 1) % 12];
const uniqueSort = arr => [...new Set(arr)].sort((a, b) => a - b);
const formatNumbers = arr => uniqueSort(arr).map(padZero).join(' ') || '无';
const inRange = (val, min, max) => val >= min && val <= max;

// 数据变动触发全自动刷新
function onDataChange() {
    clearTimeout(timer);
    timer = setTimeout(() => {
        refreshAll();
    }, 150);
}

// 全量刷新
function refreshAll() {
    calculate(1);
    calculate(2);
    showInputInfo(1);
    showInputInfo(2);
    compareAll();
    
    document.getElementById('autoTip1').innerText = getValidInput(1) ? '✅ 已自动统计' : '';
    document.getElementById('autoTip2').innerText = getValidInput(2) ? '✅ 已自动统计' : '';
    document.getElementById('autoCompareTip').innerText = (getValidInput(1) && getValidInput(2)) ? '✅ 已自动对比' : '';
}

// 获取有效数据
function getValidInput(no) {
    const val = document.getElementById(`numInput${no}`).value.trim();
    return (val.match(/\d+/g) || []).filter(n => n >=1 && n <=49).length > 0;
}

// 显示输入数量
function showInputInfo(no) {
    const val = document.getElementById(`numInput${no}`).value;
    const count = (val.match(/\d+/g) || []).length;
    document.getElementById(`inputInfo${no}`).innerText = `已输入：${count} 个数字`;
}

// 清空本组
function clearAll(no) {
    document.getElementById(`numInput${no}`).value = '';
    document.getElementById(`baseResult${no}`).innerHTML = '';
    document.getElementById(`groupResult${no}`).innerHTML = '';
    document.getElementById(`zodiacResult${no}`).innerHTML = '';
    document.getElementById(`autoTip${no}`).innerText = '';
    onDataChange();
}

// 复制功能
function copyText(text, tipId) {
    if(!text || text === '无'){ alert('暂无内容可复制'); return; }
    try {
        navigator.clipboard.writeText(text).then(() => showCopyTip(tipId));
    } catch(e) {
        const ta = document.createElement("textarea");
        ta.value = text; ta.style.position="fixed"; ta.style.left="-9999px";
        document.body.appendChild(ta); ta.select(); document.execCommand('copy');
        document.body.removeChild(ta); showCopyTip(tipId);
    }
}
function showCopyTip(tipId) {
    const t = document.getElementById(tipId);
    t.innerText = '✅ 复制成功';
    setTimeout(() => t.innerText = '', 1500);
}

// 统计核心
function calculate(no) {
    const input = document.getElementById(`numInput${no}`).value.trim();
    const inputArr = (input.match(/\d+/g) || []).map(Number).filter(n => n >= 1 && n <= 49);

    const allNumbers = Array.from({ length: 49 }, (_, i) => i + 1);
    const countMap = {};
    allNumbers.forEach(n => countMap[n] = 0);
    inputArr.forEach(n => countMap[n]++);
    countData[no] = countMap;

    const values = Object.values(countMap);
    minMax[no] = { min: Math.min(...values), max: Math.max(...values) };

    const group = {};
    allNumbers.forEach(n => {
        const c = countMap[n];
        if (!group[c]) group[c] = [];
        group[c].push(n);
    });
    const sortedCounts = Object.keys(group).map(Number).sort((a, b) => a - b);

    const zodiacCount = {};
    zodiacList.forEach(z => zodiacCount[z] = 0);
    inputArr.forEach(n => zodiacCount[getZodiac(n)]++);

    if(inputArr.length > 0){
        renderBase(no, inputArr.length, [...new Set(inputArr)].length, minMax[no].max, minMax[no].min);
        renderGroup(no, sortedCounts, group, minMax[no].max, minMax[no].min);
        renderZodiac(no, zodiacCount);
    } else {
        document.getElementById(`baseResult${no}`).innerHTML = '';
        document.getElementById(`groupResult${no}`).innerHTML = '';
        document.getElementById(`zodiacResult${no}`).innerHTML = '';
    }
}

// 渲染基础信息
function renderBase(no, total, unique, max, min) {
    document.getElementById(`baseResult${no}`).innerHTML = `
    <div class="result-item">
        <span class="result-label">总数量：</span>
        <span class="result-value highlight">${total}</span>
    </div>
    <div class="result-item">
        <span class="result-label">不重复：</span>
        <span class="result-value highlight">${unique}</span>
    </div>
    <div class="result-item">
        <span class="result-label">最热：</span>
        <span class="result-value hot">${max} 次</span>
    </div>
    <div class="result-item">
        <span class="result-label">最冷：</span>
        <span class="result-value cold">${min} 次</span>
    </div>`;
}

// 渲染次数分组
function renderGroup(no, sorted, group, maxCnt, minCnt) {
    let html = `<div style="font-weight:600;margin-bottom:8px">📦 次数统计</div>`;
    sorted.forEach((cnt, i) => {
        const list = group[cnt].map(padZero).join(' ');
        const cls = cnt === maxCnt ? 'stats-hot' : cnt === minCnt ? 'stats-cold' : '';
        html += `
        <div class="stats-item ${cls}">
            ${cnt} 次：${list}
            <button class="copy-btn" onclick="copyText('${list}','g${no}_${i}')">复制</button>
            <span id="g${no}_${i}" class="copy-tip"></span>
        </div>`;
    });
    document.getElementById(`groupResult${no}`).innerHTML = `<div class="stats-grid">${html}</div>`;
}

// 渲染生肖
function renderZodiac(no, zodiacCount) {
    let html = `<div style="font-weight:600;margin-bottom:8px">🐉 生肖统计</div>`;
    const sorted = Object.entries(zodiacCount).sort((a, b) => b[1] - a[1]);
    const max = sorted[0][1], min = sorted[sorted.length-1][1];
    sorted.forEach(([z, cnt]) => {
        const cls = cnt === max ? 'stats-hot' : cnt === min ? 'stats-cold' : '';
        html += `<div class="stats-item ${cls}">${z}：${cnt}次</div>`;
    });
    document.getElementById(`zodiacResult${no}`).innerHTML = `<div class="stats-grid">${html}</div>`;
}

// 对比结果
function clearCompare() {
    document.getElementById('compareResult').innerHTML = '';
    document.getElementById('compareTip').innerHTML = '';
    document.getElementById('autoCompareTip').innerText = '';
}

function compareAll() {
    const has1 = getValidInput(1);
    const has2 = getValidInput(2);
    
    if(!has1 || !has2){
        document.getElementById('compareResult').innerHTML = '';
        return;
    }

    const c1 = countData[1], c2 = countData[2];
    const min1 = minMax[1].min, min2 = minMax[2].min;
    const max1 = minMax[1].max, max2 = minMax[2].max;
    const all = Array.from({ length: 49 }, (_, i) => i + 1);

    const r1 = all.filter(n => inRange(c1[n], min1, 2) && inRange(c2[n], min2, 1));
    const r2 = all.filter(n => inRange(c1[n], 2, 6) && inRange(c2[n], 2, 5));
    const r3 = all.filter(n => inRange(c1[n], 6, max1) && inRange(c2[n], 4, max2));

    const s1 = formatNumbers(r1);
    const s2 = formatNumbers(r2);
    const s3 = formatNumbers(r3);
    const finalArr = uniqueSort([...r1, ...r2, ...r3]);
    const finalStr = formatNumbers(finalArr);

    document.getElementById('compareResult').innerHTML = `
    <div class="compare-item compare-l1">
        【冷门码】：${s1}
        <button class="copy-btn" onclick="copyText('${s1}','c1')">复制</button><span id="c1" class="copy-tip"></span>
    </div>
    <div class="compare-item compare-l2">
        【中热码】：${s2}
        <button class="copy-btn" onclick="copyText('${s2}','c2')">复制</button><span id="c2" class="copy-tip"></span>
    </div>
    <div class="compare-item compare-l3">
        【热门码】：${s3}
        <button class="copy-btn" onclick="copyText('${s3}','c3')">复制</button><span id="c3" class="copy-tip"></span>
    </div>
    <div class="compare-item compare-final">
        ✅ 推荐号码（共 ${finalArr.length} 个）：${finalStr}
        <button class="copy-btn" onclick="copyText('${finalStr}','cf')">复制</button><span id="cf" class="copy-tip"></span>
    </div>`;
}
</script>
</body>
</html>
