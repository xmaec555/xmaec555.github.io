        button:hover {

        button.clear {

        button.clear:hover {

        button.sort {

        button.uniq {
            background: #8049a8;

        button.compare {
            background: #cc7a29;

        }
        .result-section {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #252525;
        }
        .result-title {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .highlight {
            color: #ffaa00;
            font-weight: bold;
        }
        .hot {
            color: #ff6b6b !important;
            font-weight: bold;
        }
        .cold {
            color: #4d9fff !important;
            font-weight: bold;
        }
        .zodiac-item {
            display: inline-flex;
            align-items: center;
            margin: 5px 10px 5px 0;
            padding: 4px 8px;
            background: #333;
            border-radius: 4px;
            gap: 6px;
            color: #fff;
        }
        .group-item {
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px 15px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2a2a2a;
            flex-wrap: wrap;
            gap: 10px;
        }
        .copy-btn {
            padding: 5px 12px;
            background: #4d7a43;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .copy-btn:hover {
            background: #3f6436;
        }
        .copy-tip {
            color: #6cce6c;

        }
        .base-row {
            display: flex;
            gap: 25px;
            font-size: 15px;
            flex-wrap: wrap;
        }
        .compare-row {
            background: #3b3629 !important;
            border-left: 4px solid #cc7a29;
        }
        .final-row {
            background: #293b2a !important;
            border-left: 4px solid #4d7a43 !important;
            font-weight: bold;
        }
        .error{
            color:#ff6b6b;
            font-weight:bold;
            margin-top:10px
        }
        .bottom-link {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-top: 20px;
            line-height: 1.8;
        }
        .bottom-link a {
            color: #8ab4f8;
            text-decoration: none;
            padding: 0 4px;
        }
    </style>
</head>
<body>

<!-- 导航栏 -->
<nav>
    <div class="nav-links">
        <a href="https://m.hxyx.cc.cd">首页</a>

    </div>
</nav>

<div class="container">
    <div class="tool-box">
        <h1>蚂蚁澳彩盘口35M统计</h1>

        <div class="panel">
            <h2>第一组统计</h2>
            <div class="input-box">
                <label>蚂蚁数据-澳彩专家（第一组）：</label>
                <textarea id="numInput1" placeholder="示例：1 3 5 7 9 11" oninput="showInputInfo(1)"></textarea>
                <div class="input-info" id="inputInfo1">已输入：0 个数字</div>
            </div>
            <div class="btn-group">
                <button onclick="calculate(1)">一键统计</button>
                <button class="uniq" onclick="uniqueNum(1)">一键去重</button>
                <button class="sort" onclick="sortNum(1)">从小到大排序</button>
                <button class="clear" onclick="clearAll(1)">清空</button>
            </div>
            <div class="result-section" id="baseResult1"></div>
            <div class="result-section" id="groupResult1"></div>
            <div class="result-section" id="zodiacResult1"></div>
        </div>

        <div class="panel">
            <h2>第二组统计</h2>
            <div class="input-box">
                <label>蚂蚁数据-澳彩专家（第二组）：</label>
                <textarea id="numInput2" placeholder="示例：2 4 6 8 10 12" oninput="showInputInfo(2)"></textarea>
                <div class="input-info" id="inputInfo2">已输入：0 个数字</div>
            </div>
            <div class="btn-group">
                <button onclick="calculate(2)">一键统计</button>
                <button class="uniq" onclick="uniqueNum(2)">一键去重</button>
                <button class="sort" onclick="sortNum(2)">从小到大排序</button>
                <button class="clear" onclick="clearAll(2)">清空</button>
            </div>
            <div class="result-section" id="baseResult2"></div>
            <div class="result-section" id="groupResult2"></div>
            <div class="result-section" id="zodiacResult2"></div>
        </div>

        <div class="panel">
            <h2 style="color:#ff9c41">🔍 交叉对比结果</h2>
            <div class="btn-group">
                <button class="compare" onclick="compareAll()">✅ 开始对比</button>
                <button class="clear" onclick="clearCompare()">清空对比</button>
            </div>
            <div id="compareTip"></div>
            <div class="result-section" id="compareResult"></div>
        </div>

        <div class="bottom-link">
            <p>© 2026 蚂蚁数据澳彩团队 - 版权所有</p>
            <p>
                <a href="https://t.me/+RjaMJ26EAPw0ZTc1">频道</a>
                <a href="https://m.hxyx.cc.cd/kj.html">直播</a>
                <a href="https://m.hxyx.cc.cd">收藏</a>
            </p>
        </div>
    </div>
</div>

<script>
// 全局配置
const zodiacList = ['马','蛇','龙','兔','虎','牛','鼠','猪','狗','鸡','猴','羊'];
const countData = { 1: {}, 2: {} };
const minMax = { 1: { min:0, max:0 }, 2: { min:0, max:0 } };
const hasCalculated = {1: false, 2: false};

// 工具函数
const padZero = num => num.toString().padStart(2, '0');
const getZodiac = num => zodiacList[(num - 1) % 12];
const uniqueSort = arr => [...new Set(arr)].sort((a, b) => a - b);
const formatNumbers = arr => uniqueSort(arr).map(padZero).join(' ') || '无';
const inRange = (val, min, max) => val >= min && val <= max;

// 输入状态
function showInputInfo(no) {
    const val = document.getElementById(`numInput${no}`).value;
    const count = (val.match(/\d+/g) || []).length;
    document.getElementById(`inputInfo${no}`).innerText = `已输入：${count} 个数字`;
}

// 清空单组
function clearAll(no) {
    document.getElementById(`numInput${no}`).value = '';
    document.getElementById(`baseResult${no}`).innerHTML = '';
    document.getElementById(`groupResult${no}`).innerHTML = '';
    document.getElementById(`zodiacResult${no}`).innerHTML = '';
    hasCalculated[no] = false;
    showInputInfo(no);
}

// 复制功能
function copyText(text, tipId) {
    if(!text || text === '无'){
        alert('无内容可复制');
        return;
    }
    navigator.clipboard.writeText(text).then(() => {
        const tip = document.getElementById(tipId);
        tip.innerText = '✅ 复制成功';
        setTimeout(() => tip.innerText = '', 1500);
    }).catch(() => alert('复制失败，请手动复制'));
}

// 去重 & 排序
function uniqueNum(no) {
    const el = document.getElementById(`numInput${no}`);
    const arr = (el.value.match(/\d+/g) || []).map(Number).filter(n => n >=1 && n <=49);
    el.value = uniqueSort(arr).join(' ');
    showInputInfo(no);
}
function sortNum(no) {
    const el = document.getElementById(`numInput${no}`);
    const arr = (el.value.match(/\d+/g) || []).map(Number).filter(n => n >=1 && n <=49).sort((a,b)=>a-b);
    el.value = arr.join(' ');
    showInputInfo(no);
}

// 核心统计
function calculate(no) {
    const input = document.getElementById(`numInput${no}`).value.trim();
    const inputArr = (input.match(/\d+/g) || []).map(Number).filter(n => n >= 1 && n <= 49);
    
    if(inputArr.length === 0){
        alert('请输入1-49的数字再统计');
        return;
    }

    const allNumbers = Array.from({ length: 49 }, (_, i) => i + 1);

    const countMap = {};
    allNumbers.forEach(n => countMap[n] = 0);
    inputArr.forEach(n => countMap[n]++);
    countData[no] = countMap;

    const values = Object.values(countMap);
    minMax[no] = { min: Math.min(...values), max: Math.max(...values) };

    const group = {};
    allNumbers.forEach(n => {
        const c = countMap[n];
        if (!group[c]) group[c] = [];
        group[c].push(n);
    });
    const sortedCounts = Object.keys(group).map(Number).sort((a, b) => a - b);

    const zodiacCount = {};
    zodiacList.forEach(z => zodiacCount[z] = 0);
    inputArr.forEach(n => zodiacCount[getZodiac(n)]++);

    renderBase(no, inputArr.length, [...new Set(inputArr)].length, minMax[no].max, minMax[no].min);
    renderGroup(no, sortedCounts, group, minMax[no].max, minMax[no].min);
    renderZodiac(no, zodiacCount);
    hasCalculated[no] = true;
    showInputInfo(no);
}

// 渲染基础信息
function renderBase(no, total, unique, max, min) {
    document.getElementById(`baseResult${no}`).innerHTML = `
    <div class="result-title">📊 基础统计</div>
    <div class="base-row">
        <div>总数量：<span class="highlight">${total}</span></div>
        <div>不重复：<span class="highlight">${unique}</span></div>
        <div>最热：<span class="hot">${max} 次</span></div>
        <div>最冷：<span class="cold">${min} 次</span></div>
    </div>`;
}

// 渲染次数分组
function renderGroup(no, sorted, group, maxCnt, minCnt) {
    let html = `<div class="result-title"><span>📦 次数分组（最冷→最热）</span></div>`;
    sorted.forEach((cnt, i) => {
        const list = group[cnt].map(padZero).join(' ');
        const mark = cnt === maxCnt ? '<span class="hot">【最热】</span>' : cnt === minCnt ? '<span class="cold">【最冷】</span>' : '';
        html += `
        <div class="group-item">
            <div>${mark} 出现${cnt}次（共${group[cnt].length}个）：${list}</div>
            <div><button class="copy-btn" onclick="copyText('${list}','g${no}_${i}')">复制</button><span id="g${no}_${i}" class="copy-tip"></span></div>
        </div>`;
    });
    document.getElementById(`groupResult${no}`).innerHTML = html;
}

// 渲染生肖
function renderZodiac(no, zodiacCount) {
    const sorted = Object.entries(zodiacCount).sort((a, b) => b[1] - a[1]);
    let html = `<div class="result-title"><span>🐉 生肖统计</span></div>`;
    const max = sorted[0][1], min = sorted[sorted.length-1][1];
    sorted.forEach(([z, cnt]) => {
        const cls = cnt === max ? 'zodiac-item hot' : cnt === min ? 'zodiac-item cold' : 'zodiac-item';
        html += `<div class="${cls}">${z}：${cnt}次</div>`;
    });
    document.getElementById(`zodiacResult${no}`).innerHTML = html;
}

// 交叉对比
function clearCompare() {
    document.getElementById('compareResult').innerHTML = '';
    document.getElementById('compareTip').innerHTML = '';
}

function compareAll() {
    if(!hasCalculated[1] || !hasCalculated[2]){
        document.getElementById('compareTip').innerHTML = '<div class="error">⚠️ 请先分别点击【一键统计】两组数据，再进行对比！</div>';
        return;
    }
    document.getElementById('compareTip').innerHTML = '';

    const c1 = countData[1], c2 = countData[2];
    const min1 = minMax[1].min, min2 = minMax[2].min;
    const max1 = minMax[1].max, max2 = minMax[2].max;
    const all = Array.from({ length: 49 }, (_, i) => i + 1);

    const r1 = all.filter(n => inRange(c1[n], min1, 2) && inRange(c2[n], min2, 1));
    const r2 = all.filter(n => inRange(c1[n], 2, 6) && inRange(c2[n], 2, 5));
    const r3 = all.filter(n => inRange(c1[n], 6, max1) && inRange(c2[n], 4, max2));

    const s1 = formatNumbers(r1);
    const s2 = formatNumbers(r2);
    const s3 = formatNumbers(r3);

    const finalArr = uniqueSort([...r1, ...r2, ...r3]);
    const finalStr = formatNumbers(finalArr);

    document.getElementById('compareResult').innerHTML = `
    <div class="result-title">🎯 三组交叉对比</div>
    <div class="group-item compare-row">
        <div>【冷门码】：${s1}</div>
        <div><button class="copy-btn" onclick="copyText('${s1}','c1')">复制</button><span id="c1" class="copy-tip"></span></div>
    </div>
    <div class="group-item compare-row">
        <div>【中热码】：${s2}</div>
        <div><button class="copy-btn" onclick="copyText('${s2}','c2')">复制</button><span id="c2" class="copy-tip"></span></div>
    </div>
    <div class="group-item compare-row">
        <div>【热门码】：${s3}</div>
        <div><button class="copy-btn" onclick="copyText('${s3}','c3')">复制</button><span id="c3" class="copy-tip"></span></div>
    </div>
    <div class="group-item final-row">
        <div>✅ 三组合并去重（共 ${finalArr.length} 个）：${finalStr}</div>
        <div><button class="copy-btn" onclick="copyText('${finalStr}','cf')">复制</button><span id="cf" class="copy-tip"></span></div>
    </div>`;
}
</script>
</body>
