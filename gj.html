    <style>
        * {

        body {
            background: #121212;

        /* 顶部导航栏 - 手机电脑自适应 */

            display: flex;
            justify-content: center;

            padding: 0.9rem 5%;

        }

        .nav-links {

        .nav-links a {

        }

        .nav-links a:hover {

        }

        /* 工具容器 */
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .tool-box {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        h2 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 20px;
            font-size: 22px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 6px;
            resize: vertical;
            font-size: 14px;
            margin-bottom: 15px;
            background: #2a2a2a;
            color: #ffffff;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #3a6ea5;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #2d5a8c;
        }
        button.copy-btn {
            background: #4d7a43;
        }
        button.copy-btn:hover {
            background: #3f6436;
        }
        .result-box {
            padding: 15px;
            background: #252525;
            border-radius: 6px;
            border: 1px solid #444;
            margin-bottom: 15px;
        }
        .result-title {
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 8px;
        }
        #resultNum {
            color: #ff6b6b;
            font-weight: bold;
        }
        #resultText {
            line-height: 1.6;
            color: #e0e0e0;
            word-break: break-all;
        }

        .check-box {
            padding: 15px;
            background: #2a2722;
            border-radius: 6px;
            border: 1px solid #4a4436;
            margin-bottom: 20px;
        }
        .check-title {
            font-weight: bold;
            color: #f1d07f;
            margin-bottom: 10px;
        }
        .check-item {
            color: #d0d0d0;
            line-height: 1.5;
        }
        .check-result {
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 4px;
            display: inline-block;
        }
        .check-success {
            background: #253b25;
            color: #6cce6c;
        }
        .check-error {
            background: #3b2525;
            color: #ff6b6b;
        }

        .bottom-link {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-top: 10px;
            line-height: 1.8;
        }
        .bottom-link a {
            color: #8ab4f8;
            text-decoration: none;
            padding: 0 4px;
        }
    </style>
</head>
<body>

<!-- 精简导航栏（无logo + 手机自适应） -->
<nav>
    <div class="nav-links">
        <a href="https://m.hxyx.cc.cd/sy.html">首页</a>
        <a href="https://m.hxyx.cc.cd/i.html">统计</a>
        <a href="https://m.hxyx.cc.cd/28tj.html">28M</a>
        <a href="https://m.hxyx.cc.cd/35tj.html">35M</a>
    </div>
</nav>

<!-- 打乱工具 -->
<div class="container">
    <div class="tool-box">
        <h2>蚂蚁澳彩数据 - 打乱工具</h2>
        <textarea id="input" placeholder="请粘贴需要打乱的数据，用空格分隔"></textarea>
        
        <div class="btn-group">
            <button onclick="shuffleNum()">我要打乱</button>
            <button class="copy-btn" onclick="copyResult()">复制结果</button>
            <button onclick="clearAll()">清空重置</button>
        </div>

        <div class="result-box">
            <div class="result-title">打乱后总数：<span id="resultNum">0</span> 个</div>
            <div id="resultText">打乱结果将显示在这里...</div>
        </div>

        <div class="check-box">
            <div class="check-title">✅ 打乱前后数字复核对比</div>
            <div class="check-item"><b>打乱前：</b><span id="originalText">-</span></div>
            <div class="check-item"><b>打乱后：</b><span id="shuffledText">-</span></div>
            <div><b>复核结果：</b> <span id="checkStatus" class="check-result">未校验</span></div>
        </div>

        <div class="bottom-link">
            <p>© 2026 蚂蚁数据澳彩团队 - 版权所有</p>
            <p>
                <a href="https://t.me/+RjaMJ26EAPw0ZTc1">频道</a>
                <a href="https://m.hxyx.cc.cd/kj.html">直播</a>
                <a href="https://m.hxyx.cc.cd">收藏</a>
            </p>
        </div>
    </div>
</div>

<script>
    let currentResult = "";
    let originalNums = [];

    function shuffleArray(arr) {
        let newArr = [...arr];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
    }

    function shuffleNum() {
        const input = document.getElementById('input').value.trim();
        if (!input) return alert('请先粘贴数据！');
        originalNums = input.split(/\s+/).filter(item => item.trim());
        if (!originalNums.length) return alert('未检测到有效数据！');
        
        const resultArr = shuffleArray(originalNums);
        currentResult = resultArr.join(' ');
        document.getElementById('resultNum').textContent = resultArr.length;
        document.getElementById('resultText').textContent = currentResult;
        document.getElementById('originalText').textContent = originalNums.join(' ');
        document.getElementById('shuffledText').textContent = currentResult;
        doCheck();
    }

    async function copyResult() {
        if (!currentResult) return alert('请先生成结果！');
        try { await navigator.clipboard.writeText(currentResult); }
        catch {
            const t = document.createElement('textarea');
            t.value = currentResult; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
        }
        alert('复制成功！');
    }

    function doCheck() {
        const s = document.getElementById('checkStatus');
        const a = [...originalNums].sort().join();
        const b = currentResult.split(' ').filter(Boolean).sort().join();
        if (a === b) {
            s.className = 'check-result check-success';
            s.textContent = '✅ 完全一致';
        } else {
            s.className = 'check-result check-error';
            s.textContent = '❌ 不一致';
        }
    }

    function clearAll() {
        document.getElementById('input').value = '';
        document.getElementById('resultNum').textContent = '0';
        document.getElementById('resultText').textContent = '打乱结果将显示在这里...';
        document.getElementById('originalText').textContent = '-';
        document.getElementById('shuffledText').textContent = '-';
        const st = document.getElementById('checkStatus');
        st.className = 'check-result'; st.textContent = '未校验';
        currentResult = ''; originalNums = [];
    }
</script>
</body>
</html>
