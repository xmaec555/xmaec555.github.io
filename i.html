<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>蚂蚁澳彩统计工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        body {
            background: #121212;
            color: #e0e0e0;
            max-width: 1000px;
            margin: 0 auto;
            padding: 70px 12px 20px;
            line-height: 1.5;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            background: #1e1e1e;
            border-bottom: 1px solid #333;
            z-index: 999;
            padding: 10px 0;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px 16px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 10px;
        }

        .nav-links a {
            color: #bbbbbb;
            text-decoration: none;
            font-size: 15px;
            padding: 4px 2px;
            white-space: nowrap;
        }

        .nav-links a:hover {
            color: #ffffff;
        }

        .container {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.35);
            border: 1px solid #333;
        }

        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 22px;
            font-size: clamp(20px, 5vw, 24px);
        }

        .input-box {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #e0e0e0;
            font-size: 15px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 8px;
            resize: vertical;
            font-size: 16px;
            background: #2a2a2a;
            color: #fff;
            outline: none;
        }

        textarea:focus {
            border-color: #3a6ea5;
        }

        .tip {
            color: #aaa;
            font-size: 13px;
            margin-top: 6px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 11px 20px;
            border: none;
            border-radius: 8px;
            background-color: #3a6ea5;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }

        button:hover {
            background-color: #2d5a8c;
        }

        button.clear {
            background-color: #c75450;
        }

        button.clear:hover {
            background-color: #a84440;
        }

        .result-section {
            margin-top: 18px;
            padding: 16px;
            border: 1px solid #444;
            border-radius: 10px;
            background: #252525;
        }

        .result-title {
            font-size: 17px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .highlight {
            color: #ff6b6b;
            font-weight: bold;
        }

        .base-row {
            display: flex;
            gap: 20px;
            font-size: 15px;
            flex-wrap: wrap;
        }

        .group-item {
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px 14px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2a2a2a;
            flex-wrap: wrap;
            gap: 10px;
            word-break: break-all;
        }

        .zodiac-item {
            display: inline-flex;
            align-items: center;
            margin: 6px 8px 6px 0;
            padding: 6px 10px;
            background: #333;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
        }

        .copy-btn {
            padding: 6px 12px;
            background: #4d7a43;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: #3f6436;
        }

        .copy-tip {
            color: #6cce6c;
            font-size: 13px;
            margin-left: 6px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px 14px;
            }
            .result-section {
                padding: 14px 12px;
            }
            .group-item {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-links">
        <a href="https://m.hxyx.cc.cd/sy.html">首页</a>
        <a href="https://m.hxyx.cc.cd/28tj.html">28M</a>
        <a href="https://m.hxyx.cc.cd/35tj.html">35M</a>
        <a href="https://m.hxyx.cc.cd/gj.html">工具</a>
    </div>
</nav>

<div class="container">
    <h1>蚂蚁澳彩统计工具</h1>
    <div class="input-box">
        <label>蚂蚁数据-澳彩专家：</label>
        <textarea id="numInput" placeholder="示例：1 3 5 7 9 11"></textarea>
        <div class="tip">支持空格/换行/任意符号分隔，自动提取 1-49 数字</div>
    </div>

    <div class="btn-group">
        <button onclick="calculate()">一键统计</button>
        <button class="clear" onclick="clearAll()">清空</button>
    </div>

    <div class="result-section" id="baseResult"></div>
    <div class="result-section" id="groupResult"></div>
    <div class="result-section" id="zodiacResult"></div>
</div>

<script>
const zodiacList = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
const $ = id => document.getElementById(id);
const getZodiac = num => zodiacList[(num - 1) % 12];
const padZero = num => num.toString().padStart(2, '0');

function clearAll() {
    $('numInput').value = '';
    $('baseResult').innerHTML = '';
    $('groupResult').innerHTML = '';
    $('zodiacResult').innerHTML = '';
}

function copyText(text, tipId) {
    const tip = $(tipId);
    try {
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(() => {
                showTip(tip, true);
            }).catch(() => fallbackCopy(text, tip));
        } else {
            fallbackCopy(text, tip);
        }
    } catch (e) {
        fallbackCopy(text, tip);
    }
}

function fallbackCopy(text, tip) {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    textArea.style.position = "fixed";
    textArea.style.left = "-9999px";
    textArea.style.opacity = "0";
    document.body.appendChild(textArea);
    textArea.select();
    textArea.setSelectionRange(0, text.value.length);
    
    try {
        document.execCommand('copy');
        showTip(tip, true);
    } catch (err) {
        showTip(tip, false);
    }
    document.body.removeChild(textArea);
}

function showTip(tip, success) {
    if (success) {
        tip.textContent = "✅ 复制成功";
        tip.style.color = "#6cce6c";
    } else {
        tip.textContent = "❌ 复制失败";
        tip.style.color = "#ff6b6b";
    }
    setTimeout(() => tip.textContent = "", 1500);
}

function calculate() {
    const input = $('numInput').value.trim();
    if (!input) return alert("请输入数字");
    
    const inputArr = (input.match(/\d+/g) || [])
        .map(Number)
        .filter(n => n >= 1 && n <= 49);
    
    if (inputArr.length === 0) return alert("未识别到有效 1-49 数字");

    const countMap = {};
    for (let i = 1; i <= 49; i++) countMap[i] = 0;
    inputArr.forEach(n => countMap[n]++);

    const totalCount = inputArr.length;
    const uniqueCount = new Set(inputArr).size;
    const maxCount = Math.max(...Object.values(countMap));

    const group = {};
    for (const n in countMap) {
        const c = countMap[n];
        if(c > 0) (group[c] || (group[c] = [])).push(+n);
    }
    
    // ✅ 这一行已经改成：冷数字（次数少）在上，热数字（次数多）在下
    const sortedCounts = Object.keys(group).map(Number).sort((a, b) => a - b);

    const zodiacCount = {};
    zodiacList.forEach(z => zodiacCount[z] = 0);
    inputArr.forEach(n => zodiacCount[getZodiac(n)]++);

    renderBase(totalCount, uniqueCount, maxCount);
    renderGroup(sortedCounts, group);
    renderZodiac(zodiacCount);
}

function renderBase(total, unique, max) {
    $('baseResult').innerHTML = `
        <div class="result-title">📊 基础统计结果</div>
        <div class="base-row">
            <div>输入总数量：<span class="highlight">${total}</span></div>
            <div>不重复数量：<span class="highlight">${unique}</span></div>
            <div>最高出现次数：<span class="highlight">${max}</span></div>
        </div>
    `;
}

function renderGroup(sorted, group) {
    const allText = [];
    let html = `<div class="result-title"><span>📦 按出现次数分组（冷 → 热）</span><div></div></div>`;

    sorted.forEach((cnt, i) => {
        const nums = group[cnt];
        const list = nums.map(padZero).join(' ');
        const line = `出现${cnt}次（共${nums.length}个）：${list}`;
        allText.push(line);
        html += `
            <div class="group-item">
                <div>${line}</div>
                <div>
                    <button class="copy-btn" onclick="copyText('${line.replace(/'/g, "\\'")}', 'gtip${i}')">复制</button>
                    <span id="gtip${i}" class="copy-tip"></span>
                </div>
            </div>`;
    });

    const fullGroupText = allText.join("\n");
    html = html.replace('</div></div>', `
            <button class="copy-btn" onclick="copyText(\`${fullGroupText}\`, 'allTip')">复制全部</button>
            <span id="allTip" class="copy-tip"></span>
        </div></div>`);
    
    $('groupResult').innerHTML = html;
}

function renderZodiac(zodiacCount) {
    const sortedZodiac = Object.entries(zodiacCount).sort((a, b) => b[1] - a[1]);
    const allText = [];
    let html = `<div class="result-title"><span>🐉 生肖出现次数</span><div></div></div>`;

    sortedZodiac.forEach(([z, cnt]) => {
        const line = `${z}：${cnt}次`;
        allText.push(line);
        html += `<span class="zodiac-item">${line}</span>`;
    });

    const fullZodiacText = allText.join("\n");
    html = html.replace('</div></div>', `
            <button class="copy-btn" onclick="copyText(\`${fullZodiacText}\`, 'zAllTip')">一键复制</button>
            <span id="zAllTip" class="copy-tip"></span>
        </div></div>`);
    
    $('zodiacResult').innerHTML = html;
}
</script>
</body>
</html>
