        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        :root {
            --dark-bg: #0f0f11;
            --dark-card: #1a1a1d;
            --accent: #5b5bf7;
            --accent-light: #7c7cff;
            --text-primary: #f0f0f5;
            --text-secondary: #9ca3af;
            --border-color: #2d2d35;
            --shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.7;
            padding-top: 70px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background-color: rgba(20, 20, 23, 0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6%;
            z-index: 999;
            transition: 0.3s;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 1.5px;
        }

        .nav-links {
            display: flex;
            gap: 36px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-light);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* 主内容 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 50px 24px;
            flex: 1;
        }

        .hero {
            min-height: 75vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 28px;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 750;
            background: linear-gradient(90deg, #5b5bf7, #945eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeIn 1s ease forwards;
        }

        .hero p {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 620px;
            animation: fadeIn 1.1s ease forwards;
        }

        .btn {
            padding: 14px 36px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.35s ease;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(91,91,247,0.25);
            animation: fadeIn 1.2s ease forwards;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 26px rgba(91,91,247,0.35);
        }

        /* 底部版权 + 友情链接 */
        .footer {
            border-top: 1px solid var(--border-color);
            padding: 30px 20px;
            text-align: center;
            background-color: #141417;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 15px;
            transition: 0.3s;
        }
        .footer-links a:hover {
            color: var(--accent);
        }
        .copyright {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 移动端 */
        @media (max-width: 768px) {
            .nav-links {
                gap: 20px;
            }
            .hero h1 {
                font-size: 36px;
            }
            .hero p {
                font-size: 16px;
            }
            .navbar {
                padding: 0 20px;
            }
            .footer-links {
                gap: 20px;
            }
        }
    </style>
</head>
