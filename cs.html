<!DOCTYPE html>

<head>

    <style>
        * {

        body {

        /* 顶部霓虹导航栏 */

        }

        /* 原有工具样式 */
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .tool-box {
            background: #111;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,228,255,0.1);
            border: 1px solid #222;
        }
        h2 {
            text-align: center;
            color: #00e4ff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00e4ff;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            resize: vertical;
            font-size: 14px;
            margin-bottom: 15px;
            background: #181818;
            color: #fff;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #00e4ff;
            color: #000;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 10px #00e4ff;
        }
        button:hover {
            background: #00b8cc;

        button.copy-btn {
            background: #67c23a;

        button.copy-btn:hover {

        }
        .result-box {
            padding: 15px;
            background: #121212;
            border-radius: 6px;
            border: 1px solid #333;
            margin-bottom: 15px;
        }
        .result-title {
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }
        #resultNum {
            color: #ff4444;
            font-weight: bold;
            margin: 0 5px;
        }
        #resultText {
            line-height: 1.6;
            color: #eee;
            word-break: break-all;
        }

        .check-box {
            padding: 15px;
            background: #1a1910;
            border-radius: 6px;
            border: 1px solid #665c2c;
            margin-bottom: 20px;
        }
        .check-title {
            font-weight: bold;
            color: #ffcc00;
            margin-bottom: 10px;
        }
        .check-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }
        .check-item {
            line-height: 1.5;
            word-break: break-all;
            font-size: 13px;
            color: #ccc;
        }
        .check-result {
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 4px;
            display: inline-block;
        }
        .check-success {
            background: #002200;
            color: #00ff00;
        }
        .check-error {
            background: #220000;
            color: #ff0000;
        }

        .bottom-link {
            text-align: center;
            font-size: 14px;
            line-height: 1.8;
            margin-top: 10px;
            color: #666;
        }
        .bottom-link a {
            color: #00e4ff;
            font-weight: bold;
            text-decoration: none;
            margin: 0 5px;
        }
        .bottom-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- 炫酷霓虹导航栏 -->
<nav>
    <div class="logo">蚂蚁数据</div>
    <div class="nav-links">
        <a href="#">首页</a>
        <a href="#">工具</a>
        <a href="#">教程</a>
        <a href="#">联系</a>
    </div>
</nav>

<!-- 原有打乱工具 -->
<div class="container">
    <div class="tool-box">
        <h2>蚂蚁澳彩数据 - 打乱工具</h2>
        <textarea id="input" placeholder="请粘贴需要打乱的数据，用空格分隔"></textarea>
        
        <div class="btn-group">
            <button onclick="shuffleNum()">我要打乱</button>
            <button class="copy-btn" onclick="copyResult()">复制结果</button>
            <button onclick="clearAll()">清空重置</button>
        </div>

        <div class="result-box">
            <div class="result-title">打乱后总数：<span id="resultNum">0</span> 个</div>
            <div id="resultText">打乱结果将显示在这里...</div>
        </div>

        <div class="check-box">
            <div class="check-title">✅ 打乱前后数字复核对比</div>
            <div class="check-row">
                <div class="check-item"><b>打乱前：</b><span id="originalText">-</span></div>
                <div class="check-item"><b>打乱后：</b><span id="shuffledText">-</span></div>
            </div>
            <div>
                <b>复核结果：</b>
                <span id="checkStatus" class="check-result">未校验</span>
            </div>
        </div>

        <div class="bottom-link">
            <p>© 2026 蚂蚁数据澳彩团队 - 版权所有</p>
            <p>
                友情链接：
                <a href="https://t.me/+RjaMJ26EAPw0ZTc1" target="_blank">频道</a>
                <a href="https://m.hxyx.cc.cd/kj.html" target="_blank">直播</a>
                <a href="https://m.hxyx.cc.cd" target="_blank">收藏</a>
            </p>
        </div>
    </div>
</div>

<script>
    let currentResult = "";
    let originalNums = [];

    // 随机打乱算法
    function shuffleArray(arr) {
        let newArr = [...arr];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
    }

    // 主打乱函数
    function shuffleNum() {
        const input = document.getElementById('input').value.trim();
        if (!input) {
            alert('请先粘贴数据！');
            return;
        }

        originalNums = input.split(/\s+/).filter(item => item.trim() !== '');
        
        if (originalNums.length === 0) {
            alert('未检测到有效数据！');
            return;
        }

        const resultArr = shuffleArray(originalNums);
        currentResult = resultArr.join(' ');

        document.getElementById('resultNum').textContent = resultArr.length;
        document.getElementById('resultText').textContent = currentResult;
        document.getElementById('originalText').textContent = originalNums.join(' ');
        document.getElementById('shuffledText').textContent = currentResult;
        
        doCheck();
    }

    // 复制结果
    async function copyResult() {
        if (!currentResult) {
            alert('请先生成打乱结果！');
            return;
        }
        try {
            await navigator.clipboard.writeText(currentResult);
            alert('复制成功！');
        } catch (err) {
            const textArea = document.createElement('textarea');
            textArea.value = currentResult;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            alert('复制成功！');
        }
    }

    // 数据一致性校验
    function doCheck() {
        const statusEl = document.getElementById('checkStatus');
        const sortedOriginal = [...originalNums].sort().join(',');
        const sortedShuffled = currentResult.split(' ').filter(Boolean).sort().join(',');
        
        if (sortedOriginal === sortedShuffled) {
            statusEl.className = 'check-result check-success';
            statusEl.textContent = '✅ 完全一致（无丢失、无重复）';
        } else {
            statusEl.className = 'check-result check-error';
            statusEl.textContent = '❌ 数据不一致，请检查！';
        }
    }

    // 清空重置
    function clearAll() {
        document.getElementById('input').value = '';
        document.getElementById('resultNum').textContent = '0';
        document.getElementById('resultText').textContent = '打乱结果将显示在这里...';
        document.getElementById('originalText').textContent = '-';
        document.getElementById('shuffledText').textContent = '-';
        
        const statusEl = document.getElementById('checkStatus');
        statusEl.className = 'check-result';
        statusEl.textContent = '未校验';
        
        currentResult = "";
        originalNums = [];
    }
</script>
</body>
</html>
