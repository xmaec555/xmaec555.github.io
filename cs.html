<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAYI</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 深色主题根变量 */
        :root {
            --dark-bg: #121212;
            --dark-card: #1e1e1e;
            --accent: #4f46e5;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: #333333;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.6;
            padding-top: 70px; /* 适配固定导航栏 */
        }

        /* 导航栏样式 */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background-color: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent);
            transform: translateY(-2px);
        }

        /* 主要内容区域 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .hero {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 25px;
        }

        /* 已调小一号：从 56px → 48px */
        .hero h1 {
            font-size: 46px;
            font-weight: 700;
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 600px;
        }

        .btn {
            padding: 12px 30px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .nav-links {
                gap: 20px;
            }
            .hero h1 {
                font-size: 36px;
            }
            .hero p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="#" class="logo">MAYI</a>
        <ul class="nav-links">
            <li><a href="https://m.hxyx.cc.cd" target="_blank">首页</a></li>
            <li><a href="https://t.me/+RjaMJ26EAPw0ZTc1" target="_blank">特码</a></li>
            <li><a href="https://m.hxyx.cc.cd/6.html" target="_blank">工具</a></li>
            <li><a href="https://t.me/mayi2036" target="_blank">联系</a></li>
        </ul>
    </nav>

    <div class="container">
        <section class="hero" id="home">
            <h1>蚂蚁数据 · 澳彩专家</h1>
            <p>中奖是幸运，暴富是必然，理性下注，快乐生活，打造梦想</p>
            <a href="https://t.me/+RjaMJ26EAPw0ZTc1" class="btn" target="_blank">探索更多</a>
        </section>
    </div>
</body>
</html>
